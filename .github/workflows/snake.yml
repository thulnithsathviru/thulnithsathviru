# =====================================================================
#  CONTRIBUTION SNAKE ANIMATION
#  WHERE THIS GOES: in your thulnithsathviru/thulnithsathviru repo, at
#      .github/workflows/snake.yml
#  It runs every 12 hours, "eats" your contribution squares, and saves
#  an SVG to a branch called "output". Then reference it in README.md:
#      https://raw.githubusercontent.com/thulnithsathviru/thulnithsathviru/output/github-snake-dark.svg
#
#  AFTER ADDING IT: go to the repo's Actions tab and run it once
#  manually (the "Run workflow" button) so the image exists.
# =====================================================================
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches:
      - main

# This block is what fixes exit code 128 — it lets the job push the image.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=509353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
