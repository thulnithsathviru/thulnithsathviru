# =====================================================================
#  CONTRIBUTION SNAKE ANIMATION
#  WHERE THIS GOES: in your thulnithsathviru/thulnithsathviru repo, at
#      .github/workflows/snake.yml
#  Generates a light AND a dark snake so it stays visible in both
#  GitHub themes. Runs every 12 hours; run once manually after editing.
# =====================================================================
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches:
      - main

# Lets the job push the generated images to the "output" branch.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # color_dots goes empty -> lightest -> darkest fill.
          # Empty squares are a visible grey so the grid reads on dark bg.
          outputs: |
            dist/github-snake.svg?color_snake=509353&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-dark.svg?color_snake=39d353&color_dots=#484f58,#0e4429,#006d32,#26a641,#39d353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
